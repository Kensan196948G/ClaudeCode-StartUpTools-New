name: ClaudeOS CI Manager

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "fix/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write
  actions: read

jobs:
  build-test:
    name: Build / Lint / Test / Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: |
          npm ci || npm install

      - name: Lint
        run: |
          npm run lint --if-present

      - name: Test
        run: |
          npm test --if-present

      - name: Build
        run: |
          npm run build --if-present

      - name: KPI Success Marker
        if: success()
        run: |
          echo "CI SUCCESS" > ci_result.txt
          echo "status=success" >> "$GITHUB_OUTPUT"

      - name: Upload CI Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claudeos-ci-result
          path: |
            ci_result.txt
          if-no-files-found: ignore

  check-release-milestone:
    name: Validate 6-month Release Milestone
    runs-on: ubuntu-latest
    steps:
      - name: Check Production Release Milestone
        uses: actions/github-script@v7
        with:
          script: |
            const { data: milestones } = await github.rest.issues.listMilestones({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open'
            });
            const release = milestones.find(m =>
              /release|production|リリース|本番/i.test(m.title)
            );
            if (!release) {
              core.warning(
                'Production Release マイルストーンが未設定です。' +
                'プロジェクト開始から6ヶ月以内のマイルストーンを GitHub Projects に設定してください。'
              );
            } else {
              const due = release.due_on ? new Date(release.due_on) : null;
              core.notice(`Production Release milestone: "${release.title}" due=${due ? due.toISOString().slice(0,10) : 'unset'}`);
            }

  auto-repair-issue:
    name: Create CI Repair Issue
    needs: build-test
    if: failure()
    runs-on: ubuntu-latest

    steps:
      - name: Create CI Failure Issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = `[P1] CI failure detected: ${context.workflow}`;
            const body = `
            ## Reason
            CI failure / KPI gap

            ## Workflow
            - Name: ${context.workflow}
            - Run ID: ${context.runId}
            - Branch: ${context.ref}

            ## Acceptance
            - 再現可能
            - 修正可能
            - テスト可能
            - CIが再成功する

            ## ClaudeOS Instruction
            CIManager はこのIssueを確認し、最大5回まで修復を試行する。
            同一エラーは2回までとし、超過時は別Issueへ切り替える。
            `;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ["claudeos", "ci-failure", "P1"]
            });
