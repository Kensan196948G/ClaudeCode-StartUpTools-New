name: Security Scan

on:
  push:
    branches:
      - main
      - master
  pull_request:
  schedule:
    - cron: '23 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secrets-scan:
    name: Secrets scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
