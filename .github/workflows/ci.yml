name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  test-and-validate:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PowerShell Modules
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module Pester -Force -SkipPublisherCheck -Scope CurrentUser

      - name: Run Pester
        shell: pwsh
        run: |
          $null = New-Item -ItemType Directory -Force -Path .\reports
          $cfg = New-PesterConfiguration
          $cfg.Run.Path = '.\tests'
          $cfg.TestResult.Enabled = $true
          $cfg.TestResult.OutputPath = '.\reports\testResults.xml'
          $cfg.Run.Exit = $true
          Invoke-Pester -Configuration $cfg

      - name: Report Test Count
        if: always()
        shell: pwsh
        run: |
          $xmlPath = if (Test-Path .\reports\testResults.xml) { '.\reports\testResults.xml' } else { 'testResults.xml' }
          if (Test-Path $xmlPath) {
            $xml = [xml](Get-Content $xmlPath)
            $root = $xml.'test-results'
            $total = [int]$root.total
            $failed = [int]$root.failures + [int]$root.errors
            $passed = $total - $failed
            Write-Host "::notice::Pester Tests: $passed passed / $total total ($failed failed)"
          }

      - name: Restore files modified by Pester
        shell: pwsh
        run: |
          git checkout -- TASKS.md

      - name: Validate Config Template Schema
        shell: pwsh
        run: |
          Import-Module .\scripts\lib\Config.psm1 -Force
          Assert-StartupConfigSchema -ConfigPath .\config\config.json.template

      - name: Validate Diagnostics JSON Schema
        shell: pwsh
        run: |
          $tempRoot = Join-Path $env:TEMP 'ai-startup-ci'
          $bin = Join-Path $tempRoot 'bin'
          $projects = Join-Path $tempRoot 'projects'
          New-Item -ItemType Directory -Force -Path $bin, $projects, (Join-Path $projects 'demo') | Out-Null
          Set-Content -Path (Join-Path $bin 'claude.cmd') -Encoding ASCII -Value "@echo off`r`nif ""%1""==""--version"" ( echo claude 1.0 & exit /b 0 )`r`necho claude stub"
          Set-Content -Path (Join-Path $bin 'codex.cmd') -Encoding ASCII -Value "@echo off`r`nif ""%1""==""--version"" ( echo codex 1.0 & exit /b 0 )`r`necho codex stub"
          Set-Content -Path (Join-Path $bin 'gh.cmd') -Encoding ASCII -Value "@echo off`r`nif ""%1""==""--version"" ( echo gh 1.0 & exit /b 0 )`r`nif ""%1""==""auth"" if ""%2""==""status"" ( exit /b 0 )`r`necho gh stub"
          Set-Content -Path (Join-Path $bin 'copilot.cmd') -Encoding ASCII -Value "@echo off`r`nif ""%1""==""--version"" ( echo copilot 1.0 & exit /b 0 )`r`nif ""%1""==""auth"" ( exit /b 0 )`r`necho copilot stub"
          Set-Content -Path (Join-Path $bin 'node.cmd') -Encoding ASCII -Value "@echo off`r`necho v20.0.0"
          Set-Content -Path (Join-Path $bin 'npm.cmd') -Encoding ASCII -Value "@echo off`r`necho 10.0.0"
          Set-Content -Path (Join-Path $bin 'git.cmd') -Encoding ASCII -Value "@echo off`r`necho git version 2.0.0"
          Set-Content -Path (Join-Path $bin 'ssh.cmd') -Encoding ASCII -Value "@echo off`r`necho OpenSSH_9"
          $config = @{
            version = '2.0.0'
            projectsDir = $projects
            sshProjectsDir = $projects
            projectsDirUnc = '\\server\share'
            linuxHost = 'host'
            linuxBase = '/home/kensan/Projects'
            localExcludes = @()
            tools = @{
              defaultTool = 'claude'
              claude = @{ enabled = $true; command = 'claude'; args = @(); installCommand = 'install-claude'; env = @{}; apiKeyEnvVar = 'ANTHROPIC_API_KEY' }
              codex = @{ enabled = $true; command = 'codex'; args = @(); installCommand = 'install-codex'; env = @{ OPENAI_API_KEY = '' }; apiKeyEnvVar = 'OPENAI_API_KEY' }
              copilot = @{ enabled = $true; command = 'copilot'; args = @('--yolo'); installCommand = 'install-copilot'; env = @{}; apiKeyEnvVar = '' }
            }
            recentProjects = @{ enabled = $true; maxHistory = 10; historyFile = '%USERPROFILE%\\.ai-startup\\recent-projects.json' }
            logging = @{ enabled = $true }
          } | ConvertTo-Json -Depth 10
          $configPath = Join-Path $tempRoot 'config.json'
          $mcpPath = Join-Path $tempRoot '.mcp.json'
          Set-Content -Path $configPath -Value $config -Encoding UTF8
          @{ mcpServers = @{ memory = @{ command = 'node'; args = @('memory.js') } } } | ConvertTo-Json -Depth 10 | Set-Content -Path $mcpPath -Encoding UTF8
          $env:AI_STARTUP_CONFIG_PATH = $configPath
          $env:AI_STARTUP_MCP_CONFIG_PATH = $mcpPath
          $env:PATH = "$bin;$env:PATH"
          . .\scripts\test\Test-AllTools.ps1
          $schema = Get-Content .\docs\common\schemas\test-all-tools-report.schema.json -Raw | ConvertFrom-Json
          if ($schema.schemaVersion -ne '1.0.0') { throw "schemaVersion mismatch in schema document: $($schema.schemaVersion)" }
          $report = Get-AllToolsDiagnostics -ConfigPath $configPath
          $errors = Test-AllToolsReportSchema -Report $report
          if ($errors.Count -gt 0) { throw ($errors -join "`n") }

      - name: Validate Agent Teams Backlog Sync
        shell: pwsh
        run: |
          $doc = Get-Content .\docs\common\08_AgentTeams対応表.md -Raw -Encoding UTF8
          $tasks = Get-Content .\TASKS.md -Raw -Encoding UTF8
          $requiredTerms = @('Agent Teams', 'MCP', 'Worktree', 'Backlog')
          foreach ($term in $requiredTerms) {
            if ($doc -notmatch [regex]::Escape($term)) { throw "対応表にキーワードがありません: $term" }
            if ($tasks -notmatch [regex]::Escape($term)) { throw "TASKS.md にキーワードがありません: $term" }
          }

      - name: Validate TASKS Tooling
        shell: pwsh
        run: |
          .\scripts\tools\Update-TASKS.ps1 -Action list | Out-Null
          .\scripts\tools\Sync-AgentTeamsBacklog.ps1 -Action check

      - name: Validate TASKS.md Issue Sync Format
        shell: pwsh
        run: |
          .\scripts\tools\Sync-Issues.ps1 -Action check

      - name: Validate State Schema
        shell: pwsh
        run: |
          $schema = Get-Content .\state.schema.json -Raw | ConvertFrom-Json
          if (-not $schema.'$schema') { throw "state.schema.json is missing \$schema field" }
          $required = $schema.required
          if ($required.Count -lt 5) { throw "state.schema.json has too few required fields: $($required.Count)" }
          Write-Host "state.schema.json validated: $($required.Count) required top-level fields"

      - name: Validate State Example Against Schema
        shell: bash
        run: node scripts/validate-state-example.js

      - name: Check Doc Version Consistency
        shell: bash
        run: node scripts/check-doc-versions.js

      - name: Check README Stats Up-to-date
        shell: bash
        run: |
          node scripts/update-readme-stats.js
          if ! git diff --quiet README.md; then
            echo "::error::README.md の統計情報が古いです。ローカルで 'node scripts/update-readme-stats.js' を実行してコミットしてください。"
            git diff README.md
            exit 1
          fi

      - name: Markdown Lint
        shell: bash
        run: |
          npx --yes markdownlint-cli2 "docs/**/*.md" "README.md" "CHANGELOG.md" || echo "::warning::Markdown lint found issues (non-blocking)"
        continue-on-error: true

      - name: Check Legacy References
        shell: pwsh
        run: |
          $patterns = @(
            'Claude-DevTools',
            'Claude-ChromeDevTools-Final',
            'Claude-EdgeDevTools',
            'run-codex\.sh',
            'scripts\\Start-CodexCLI\.ps1',
            'scripts\\Start-CopilotCLI\.ps1',
            '"zDrive"',
            'claudeCode'
          )
          $targets = @('README.md', 'CLAUDE.md') + @(Get-ChildItem -Path docs, config -Recurse -File | ForEach-Object { $_.FullName })
          foreach ($pattern in $patterns) {
            $found = $targets | Where-Object { Test-Path $_ } | ForEach-Object { Select-String -Path $_ -Pattern $pattern -CaseSensitive -ErrorAction SilentlyContinue }
            if ($found) {
              $found | ForEach-Object { Write-Host "$($_.Path):$($_.LineNumber): $($_.Line)" }
              throw "旧構成の参照が残っています: $pattern"
            }
          }

      - name: Check No Cloud-Schedule Remnants in Operational Code
        shell: pwsh
        run: |
          # v3.2.70 以降: Cloud Schedule / /schedule / /loop は廃止。
          # テスト・CHANGELOG・TASKS.md・歴史的ドキュメントは除外。
          $forbidden = @(
            '/schedule ClaudeOS',
            '/loop.*ClaudeOS',
            'New-CloudSchedule',
            'RemoteTrigger.*Cloud',
            'Cloud Schedule.*登録'
          )
          $excludePatterns = @('CHANGELOG', 'TASKS.md', 'NewCloudSchedule.Tests', 'New-CloudSchedule.ps1', '.git', 'CLAUDE.md')
          $targets = Get-ChildItem -Path . -Recurse -Include '*.ps1','*.md','*.json' -ErrorAction SilentlyContinue |
            Where-Object {
              $f = $_.FullName
              $exclude = $false
              foreach ($ep in $excludePatterns) { if ($f -match [regex]::Escape($ep)) { $exclude = $true; break } }
              -not $exclude
            }
          $violations = @()
          foreach ($pattern in $forbidden) {
            $found = $targets | ForEach-Object { Select-String -Path $_.FullName -Pattern $pattern -ErrorAction SilentlyContinue }
            if ($found) { $violations += $found }
          }
          if ($violations.Count -gt 0) {
            $violations | ForEach-Object { Write-Host "::error::$($_.Path):$($_.LineNumber): $($_.Line.Trim())" }
            throw "Cloud Schedule / /loop 系の旧運用コードが $($violations.Count) 件残っています。v3.2.70 方針との矛盾を解消してください。"
          }
          Write-Host "OK: Cloud/Loop 残骸なし"

  lint-powershell:
    name: PSScriptAnalyzer
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -Force -SkipPublisherCheck -Scope CurrentUser

      - name: Run PSScriptAnalyzer (Error severity only)
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer `
            -Path . `
            -Recurse `
            -Severity Error `
            -ExcludeRule PSAvoidUsingWriteHost,PSUseDeclaredVarsMoreThanAssignments `
            -ErrorAction SilentlyContinue
          if ($results) {
            $results | Format-Table -AutoSize | Out-String | Write-Host
            Write-Host "::error::PSScriptAnalyzer found $($results.Count) error-level issue(s)"
            exit 1
          }
          Write-Host "::notice::PSScriptAnalyzer: no error-level issues found"

      - name: Run PSScriptAnalyzer (Warning summary, non-blocking)
        if: always()
        shell: pwsh
        run: |
          $warnings = Invoke-ScriptAnalyzer `
            -Path . `
            -Recurse `
            -Severity Warning `
            -ExcludeRule PSAvoidUsingWriteHost,PSUseDeclaredVarsMoreThanAssignments `
            -ErrorAction SilentlyContinue
          if ($warnings) {
            Write-Host "::notice::PSScriptAnalyzer warnings (non-blocking): $($warnings.Count) issue(s)"
            $warnings | Group-Object RuleName | Sort-Object Count -Descending | Select-Object Count, Name | Format-Table -AutoSize | Out-String | Write-Host
          } else {
            Write-Host "::notice::PSScriptAnalyzer: no warning-level issues"
          }
