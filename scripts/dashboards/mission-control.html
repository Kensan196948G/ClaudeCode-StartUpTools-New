  <script type="text/babel">
const __TWEAKS_STYLE = `
  .twk-panel{position:fixed;right:16px;bottom:16px;z-index:2147483646;width:280px;
    max-height:calc(100vh - 32px);display:flex;flex-direction:column;
    background:rgba(250,249,247,.78);color:#29261b;
    -webkit-backdrop-filter:blur(24px) saturate(160%);backdrop-filter:blur(24px) saturate(160%);
    border:.5px solid rgba(255,255,255,.6);border-radius:14px;
    box-shadow:0 1px 0 rgba(255,255,255,.5) inset,0 12px 40px rgba(0,0,0,.18);
    font:11.5px/1.4 ui-sans-serif,system-ui,-apple-system,sans-serif;overflow:hidden}
  .twk-hd{display:flex;align-items:center;justify-content:space-between;
    padding:10px 8px 10px 14px;cursor:move;user-select:none}
  .twk-hd b{font-size:12px;font-weight:600;letter-spacing:.01em}
  .twk-x{appearance:none;border:0;background:transparent;color:rgba(41,38,27,.55);
    width:22px;height:22px;border-radius:6px;cursor:default;font-size:13px;line-height:1}
  .twk-x:hover{background:rgba(0,0,0,.06);color:#29261b}
  .twk-body{padding:2px 14px 14px;display:flex;flex-direction:column;gap:10px;
    overflow-y:auto;overflow-x:hidden;min-height:0}
  .twk-row{display:flex;flex-direction:column;gap:5px}
  .twk-row-h{flex-direction:row;align-items:center;justify-content:space-between;gap:10px}
  .twk-lbl{display:flex;justify-content:space-between;align-items:baseline;
    color:rgba(41,38,27,.72)}
  .twk-lbl>span:first-child{font-weight:500}
  .twk-sect{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
    color:rgba(41,38,27,.45);padding:10px 0 0}
  .twk-sect:first-child{padding-top:0}
  .twk-field{appearance:none;box-sizing:border-box;width:100%;min-width:0;height:26px;padding:0 8px;
    border:.5px solid rgba(0,0,0,.1);border-radius:7px;
    background:rgba(255,255,255,.6);color:inherit;font:inherit;outline:none}
  select.twk-field{padding-right:22px;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='rgba(0,0,0,.5)' d='M0 0h10L5 6z'/></svg>");background-repeat:no-repeat;background-position:right 8px center}
  .twk-toggle{position:relative;width:32px;height:18px;border:0;border-radius:999px;
    background:rgba(0,0,0,.15);transition:background .15s;cursor:default;padding:0}
  .twk-toggle[data-on="1"]{background:#34c759}
  .twk-toggle i{position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;
    background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.25);transition:transform .15s}
  .twk-toggle[data-on="1"] i{transform:translateX(14px)}
  .twk-chips{display:flex;gap:6px}
  .twk-chip{position:relative;appearance:none;flex:1;min-width:0;height:46px;
    padding:0;border:0;border-radius:6px;overflow:hidden;cursor:default;
    box-shadow:0 0 0 .5px rgba(0,0,0,.12),0 1px 2px rgba(0,0,0,.06)}
  .twk-chip[data-on="1"]{box-shadow:0 0 0 1.5px rgba(0,0,0,.85),0 2px 6px rgba(0,0,0,.15)}
  .twk-chip svg{position:absolute;top:6px;left:6px;width:13px;height:13px;filter:drop-shadow(0 1px 1px rgba(0,0,0,.3))}
`;

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);
  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd">
          <b>{title}</b>
          <button className="twk-x" onClick={() => setOpen(false)}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}
function TweakSection({ label, children }) { return (<><div className="twk-sect">{label}</div>{children}</>); }
function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}
function TweakSelect({ label, value, options, onChange }) {
  return (
    <div className="twk-row">
      <div className="twk-lbl"><span>{label}</span></div>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </div>
  );
}
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) return null;
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <div className="twk-row">
      <div className="twk-lbl"><span>{label}</span></div>
      <div className="twk-chips">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero] = colors;
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" data-on={on ? '1' : '0'}
                    style={{ background: hero, flex: 1, height: 32 }}
                    onClick={() => onChange(o)} />
          );
        })}
      </div>
    </div>
  );
}
Object.assign(window, { useTweaks, TweaksPanel, TweakSection, TweakToggle, TweakSelect, TweakColor });
  </script>

function applyTheme(isDark) {

function formatDuration(min) {
  const h = Math.floor(min / 60);
  const m = min % 60;
  return h > 0 ? `${h}h ${m}m` : `${m}m`;
}
function formatTime(iso) {
  if (!iso) return "—";
  return new Date(iso).toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit" });
}

function StatusDot({ status, size = 8 }) {
  const colors = {
    working: MC.green, active: MC.green, running: MC.green, success: MC.green, open: MC.green,
    completed: MC.accent, merged: MC.purple, passed: MC.accent,
    idle: MC.textMuted, pending: MC.textMuted, paused: MC.textMuted, skipped: MC.textMuted,
    failed: MC.red, error: MC.red, "needs-input": MC.amber,
  };
  const c = colors[status] || MC.textMuted;
  const pulse = status === "working" || status === "running" || status === "active";
  return (
    <span style={{ display:"inline-block", position:"relative", width:size, height:size, flexShrink:0 }}>
      <span style={{
        display:"block", width:size, height:size, borderRadius:"50%", background:c,
        boxShadow: pulse ? `0 0 ${size}px ${c}` : "none",
        animation: pulse ? "mcPulse 2s ease-in-out infinite" : "none",
      }} />
    </span>
  );
}
window.StatusDot = StatusDot;

function Gauge({ value, max = 100, size = 80, strokeWidth = 6, color, label, sublabel }) {
  const pct = Math.min(value / max, 1);
  const r = (size - strokeWidth) / 2;
  const circ = 2 * Math.PI * r;
  const c = color || (pct > 0.8 ? MC.green : pct > 0.5 ? MC.accent : pct > 0.25 ? MC.amber : MC.red);
  return (
    <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:4 }}>
      <svg width={size} height={size} style={{ transform:"rotate(-90deg)" }}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={MC.border} strokeWidth={strokeWidth} />
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={c} strokeWidth={strokeWidth}
          strokeDasharray={circ} strokeDashoffset={circ * (1 - pct)} strokeLinecap="round"
          style={{ transition:"stroke-dashoffset 1s ease" }} />
      </svg>
      <div style={{ marginTop:-size/2-12, textAlign:"center", height:size/2+12, display:"flex", flexDirection:"column", justifyContent:"center" }}>
        <div style={{ fontSize:size/3.5, fontWeight:700, fontFamily:MC.mono, color:c }}>{Math.round(pct*100)}%</div>
      </div>
      {label && <div style={{ fontSize:11, color:MC.textDim, marginTop:2, textAlign:"center" }}>{label}</div>}
      {sublabel && <div style={{ fontSize:10, color:MC.textMuted, textAlign:"center" }}>{sublabel}</div>}
    </div>
  );
}
window.Gauge = Gauge;

function Tag({ children, color, bg }) {

  );
}
window.Tag = Tag;

function TopBar({ state, sessionElapsed, setSessionElapsed, darkMode, onToggleDark, lastUpdated, sseConnected, livePhase }) {
  const [now, setNow] = useState(new Date());
  useEffect(() => {
    const t = setInterval(() => { setNow(new Date()); setSessionElapsed(prev => prev + 1/60); }, 1000);
    return () => clearInterval(t);
  }, []);
  const remaining = state.execution.max_duration_minutes - sessionElapsed;
  const remainH = Math.floor(remaining / 60);
  const remainM = Math.floor(remaining % 60);
  const remainS = Math.floor((remaining % 1) * 60);
  const pctElapsed = sessionElapsed / state.execution.max_duration_minutes;
  const updStr = lastUpdated
    ? lastUpdated.toLocaleTimeString("ja-JP", { hour:"2-digit", minute:"2-digit", second:"2-digit" })
    : "—";
  return (
    <header style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"0 20px", height:48, background:MC.bgPanel, borderBottom:`1px solid ${MC.border}`, flexShrink:0, gap:16 }}>

        <div style={{ width:28, height:28, borderRadius:6, display:"flex", alignItems:"center", justifyContent:"center", background:`linear-gradient(135deg, ${MC.accent}, ${MC.purple})`, fontSize:14, fontWeight:800 }}>C</div>
        <div>
          <div style={{ fontSize:13, fontWeight:700, color:MC.text, letterSpacing:"0.04em" }}>ClaudeOS <span style={{ color:MC.accent }}>v9.0</span></div>

      <div style={{ flex:1, maxWidth:500, display:"flex", flexDirection:"column", gap:3 }}>
        <div style={{ display:"flex", justifyContent:"space-between", fontSize:10, fontFamily:MC.mono }}>
          <span style={{ color:MC.textDim }}>セッション経過 {formatDuration(Math.floor(sessionElapsed))}</span>
          <span style={{ color: remaining < 30 ? MC.red : remaining < 60 ? MC.amber : MC.accent }}>
            残り {remainH}h {String(remainM).padStart(2,'0')}m {String(remainS).padStart(2,'0')}s
          </span>
        </div>
        <div style={{ height:4, background:MC.border, borderRadius:2, overflow:"hidden" }}>
          <div style={{ height:"100%", borderRadius:2, transition:"width 1s linear", width:`${Math.min(pctElapsed*100,100)}%`, background: pctElapsed > 0.9 ? MC.red : pctElapsed > 0.8 ? MC.amber : `linear-gradient(90deg, ${MC.accent}, ${MC.green})` }} />
        </div>

        {/* SSE ライブ接続インジケーター */}
        <div style={{ fontSize:10, fontFamily:MC.mono, display:"flex", alignItems:"center", gap:3,
          color: sseConnected ? "#ff4444" : MC.textMuted }}>
          <span style={{ fontSize:8, animation: sseConnected ? "ssePulse 1.5s ease-in-out infinite" : "none" }}>●</span>
          <span>{sseConnected ? "LIVE" : "OFFLINE"}</span>
        </div>
        {/* 最終データ更新時刻 */}
        <div style={{ fontSize:9, fontFamily:MC.mono, color:MC.textMuted, display:"flex", alignItems:"center", gap:3 }}>
          <span style={{ color: lastUpdated ? MC.green : MC.textMuted }}>●</span>
          <span>{updStr}</span>
        </div>
        <button onClick={onToggleDark} title={darkMode ? "ライトモード" : "ダークモード"}
          style={{ width:34, height:34, borderRadius:8, border:`1px solid ${MC.border}`, background:MC.bgCard, display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer", fontSize:16, color:MC.text }}
          onMouseEnter={e => { e.currentTarget.style.background = MC.accent+"20"; e.currentTarget.style.borderColor = MC.accent; }}
          onMouseLeave={e => { e.currentTarget.style.background = MC.bgCard; e.currentTarget.style.borderColor = MC.border; }}
        >{darkMode ? "☀️" : "🌙"}</button>
        <div style={{ fontSize:12, fontFamily:MC.mono, color:MC.text }}>{now.toLocaleTimeString("ja-JP")}</div>
      </div>
    </header>
  );
}

  <script type="text/babel">
const AgentsPanel = ({ state, liveData, agentTeamsActivity }) => {
  const [selectedAgent, setSelectedAgent] = React.useState(null);
  const [teamPattern, setTeamPattern] = React.useState("A");

  const agents = (liveData?.agentTeams?.length ? liveData.agentTeams : null) || window.AGENTS_DATA;

  agents.forEach(a => { statusCounts[a.status] = (statusCounts[a.status] || 0) + 1; });
  return (
    <div style={{ display:"grid", gridTemplateColumns:"1fr 300px", gridTemplateRows:"auto 1fr", gap:12, height:"100%" }}>

        <AgentStatCard label="完了" value={statusCounts.completed} icon="✔" color={MC.accent} />
        <AgentStatCard label="待機" value={statusCounts.idle} icon="✙" color={MC.textMuted} />

          <span style={{ fontSize:11, color:MC.textDim, whiteSpace:"nowrap" }}>Team パターン:</span>
          {["A","B","C"].map(p => (
            <button key={p} onClick={() => setTeamPattern(p)} style={{
              padding:"4px 14px", borderRadius:4, border:`1px solid ${teamPattern===p ? MC.accent : MC.border}`,
              background: teamPattern===p ? MC.accent+"20" : "transparent",
              color: teamPattern===p ? MC.accent : MC.textMuted, fontSize:11, fontWeight:600, cursor:"pointer", fontFamily:MC.mono,
            }}>{p}</button>
          ))}
          <span style={{ fontSize:10, color:MC.textMuted, marginLeft:"auto" }}>
            {teamPattern==="A" ? "並列実装" : teamPattern==="B" ? "品質強化" : "調査・設計"}
          </span>
        </div>
      </div>
      {/* Agent Teams Activity — agent-teams-tracker.js hook 由来の計測値 */}

        <span style={{ fontSize:11, color:MC.textDim, fontWeight:600 }}>📊 Agent Teams Activity</span>
        {ata ? (
          <>
            <span style={{ fontSize:11, fontFamily:MC.mono, color:MC.green }}>
              TeamCreate: <b style={{ fontSize:13 }}>{ata.current.team_create_count}</b>
            </span>
            <span style={{ fontSize:11, fontFamily:MC.mono, color:MC.accent }}>
              SendMessage: <b style={{ fontSize:13 }}>{ata.current.send_message_count}</b>
            </span>
            <span style={{ fontSize:11, fontFamily:MC.mono, color:MC.textMuted }}>
              現セッション patterns: [{(ata.current.patterns_used || []).join(",") || "—"}]
            </span>
            <span style={{ fontSize:11, fontFamily:MC.mono, color:MC.textMuted }}>
              直近 7日: A={ata.last_7days.pattern_count.A} B={ata.last_7days.pattern_count.B} C={ata.last_7days.pattern_count.C}

              <span style={{ fontSize:10, color:MC.textMuted, marginLeft:"auto" }}>

              </span>
            )}

          <span style={{ fontSize:11, color:MC.textMuted }}>

        <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(220px, 1fr))", gap:1, background:MC.border }}>
          {agents.map(agent => (
            <AgentCard key={agent.id} agent={agent} selected={selectedAgent===agent.id}
              onClick={() => setSelectedAgent(selectedAgent===agent.id ? null : agent.id)} />
          ))}

      </Panel>
      <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
        <Panel title="起動チェーン" icon="🔗"><AgentChain phase={state.execution.phase} /></Panel>

      </div>

};
const AgentStatCard = ({ label, value, icon, color }) => (
  <div style={{ background:MC.bgPanel, border:`1px solid ${MC.border}`, borderRadius:8, padding:"10px 14px", display:"flex", alignItems:"center", gap:10, minWidth:100 }}>
    <span style={{ fontSize:18, opacity:0.8 }}>{icon}</span>
    <div>
      <div style={{ fontSize:20, fontWeight:800, fontFamily:MC.mono, color }}>{value}</div>
      <div style={{ fontSize:9, color:MC.textMuted }}>{label}</div>
    </div>
  </div>
);
const AgentCard = ({ agent, selected, onClick }) => {
  const [hovered, setHovered] = React.useState(false);
  return (
    <div onClick={onClick} onMouseEnter={() => setHovered(true)} onMouseLeave={() => setHovered(false)}
      style={{ padding:"10px 12px", cursor:"pointer", background: selected ? MC.accent+"10" : hovered ? MC.bgCard : MC.bgPanel, borderLeft:`3px solid ${selected ? MC.accent : "transparent"}`, display:"flex", alignItems:"center", gap:10, transition:"all 0.15s" }}>
      <span style={{ fontSize:18 }}>{agent.icon}</span>
      <div style={{ flex:1, minWidth:0 }}>
        <div style={{ display:"flex", alignItems:"center", gap:6 }}>
          <StatusDot status={agent.status} size={6} />
          <span style={{ fontSize:12, fontWeight:600, color:MC.text }}>{agent.name}</span>
        </div>
        <div style={{ fontSize:9, color:MC.textMuted, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{agent.lastAction}</div>
      </div>
      {agent.time && <span style={{ fontSize:9, color:MC.textMuted, flexShrink:0 }}>{agent.time}</span>}
    </div>
  );
};
const AgentDetail = ({ agent }) => (
  <Panel title={`${agent.icon} ${agent.name}`}>
    <div style={{ display:"flex", flexDirection:"column", gap:10, fontSize:11 }}>
      <div style={{ display:"flex", justifyContent:"space-between" }}><span style={{ color:MC.textMuted }}>日本語名</span><span style={{ color:MC.text }}>{agent.nameJa}</span></div>
      <div style={{ display:"flex", justifyContent:"space-between" }}><span style={{ color:MC.textMuted }}>ステータス</span><div style={{ display:"flex", alignItems:"center", gap:4 }}><StatusDot status={agent.status} size={6} /><span style={{ color:MC.text, textTransform:"capitalize" }}>{agent.status}</span></div></div>
      <div style={{ display:"flex", justifyContent:"space-between" }}><span style={{ color:MC.textMuted }}>ドメイン</span><Tag color={MC.purple}>{agent.domain}</Tag></div>
      <div style={{ borderTop:`1px solid ${MC.border}`, paddingTop:8 }}><div style={{ color:MC.textMuted, marginBottom:4 }}>最終アクション</div><div style={{ color:MC.text, lineHeight:1.5 }}>{agent.lastAction}</div></div>
    </div>
  </Panel>
);
const AgentChain = ({ phase }) => {
  const chains = { Monitor:["CTO","PM","Analyst","Architect","DevOps","CMDB"], Development:["Architect","Developer","Reviewer"], Verify:["QA","Reviewer","Security","DevOps","e2e","Audit"], Improvement:["EvolutionMgr","PM","Architect","Developer","QA"] };
  const chain = chains[phase] || chains.Development;
  return (
    <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
      {chain.map((name, i) => (
        <div key={i} style={{ display:"flex", alignItems:"center", gap:6, fontSize:10 }}>
          <span style={{ color: i===0 ? MC.green : MC.accent, fontFamily:MC.mono }}>{i===0 ? "▶" : "→"}</span>
          <span style={{ color: i<2 ? MC.text : MC.textDim }}>{name}</span>
          {i<2 && <StatusDot status="working" size={5} />}
        </div>
      ))}
    </div>
  );
};
window.AgentsPanel = AgentsPanel;
  </script>

            const dot = h.status === 'done'    ? '✅'
                      : h.status === 'failed'  ? '❌'
                      : h.status === 'running' ? '⏳'
                      : h.status === 'timeout' ? '⏰' : '⚪';
            const isOpen = expanded === i;
            return (
              <React.Fragment key={i}>
                <tr
                  onClick={() => setExpanded(isOpen ? null : i)}
                  style={{ borderBottom: `1px solid ${MC.bgPanel}`, cursor: h.output ? 'pointer' : 'default',
                           background: isOpen ? MC.bgPanel : 'transparent' }}>
                  <td style={{ padding: '4px 6px', color: MC.textDim, fontSize: 11 }}>{h.output ? (isOpen ? '▼' : '▶') : ' '}</td>
                  <td style={{ padding: '4px 8px', color: MC.text }}>{m.icon} {h.jobId}</td>
                  <td style={{ padding: '4px 8px' }}>{dot} {h.status}</td>
                  <td style={{ padding: '4px 8px', color: MC.textMuted }}>{h.startAt?.slice(11, 19) || '—'}</td>
                  <td style={{ padding: '4px 8px', color: MC.textMuted }}>{h.endAt?.slice(11, 19) || '…'}</td>
                  <td style={{ padding: '4px 8px', color: h.exitCode ? '#f66' : MC.textMuted }}>{h.exitCode ?? '—'}</td>
                </tr>
                {isOpen && h.output && (
                  <tr style={{ background: MC.bgPanel }}>
                    <td colSpan={6} style={{ padding: '8px 12px' }}>
                      <pre style={{ margin: 0, fontSize: 11, color: MC.textMuted, whiteSpace: 'pre-wrap', wordBreak: 'break-all',

                        {h.output}
                      </pre>
                    </td>
                  </tr>
                )}
              </React.Fragment>
            );
          })}
        </tbody>
      </table>
    </>
  );
}

function JobsPanel() {
  const [status,     setStatus]     = React.useState({ running: {}, history: [], jobs: [], jobsMeta: {} });
  const [error,      setError]      = React.useState(null);
  const [busy,       setBusy]       = React.useState({});
  const [confirmJob, setConfirmJob] = React.useState(null);  // 二段階確認中のジョブID

  const fetchStatus = React.useCallback(() => {
    fetch('/api/jobs/status')
      .then(r => r.json())
      .then(d => { setStatus(d); setError(null); })
      .catch(e => setError(e.message));
  }, []);

  React.useEffect(() => {
    fetchStatus();
    const tid = setInterval(fetchStatus, 3000);
    return () => clearInterval(tid);
  }, [fetchStatus]);

  const runJob = (jobId) => {
    if (status.running[jobId] || busy[jobId]) return;
    setBusy(b => ({ ...b, [jobId]: true }));
    fetch('/api/jobs', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ jobId }),
    })
      .then(r => r.json())
      .then(d => {
        if (d.error) setError(d.error);
        setTimeout(fetchStatus, 600);
      })
      .catch(e => setError(e.message))
      .finally(() => setBusy(b => ({ ...b, [jobId]: false })));
  };

  const handleRunClick = (jobId) => {
    if (status.running[jobId] || busy[jobId]) return;
    const meta = status.jobsMeta?.[jobId];
    if (meta?.requireConfirm) { setConfirmJob(jobId); } else { runJob(jobId); }
  };

  const jobs     = status.jobs.length > 0 ? status.jobs : Object.keys(JOB_META);
  const jobsMeta = status.jobsMeta || {};

  const cardStyle = {
    border: `1px solid ${MC.border}`,
    borderRadius: 8,
    padding: 14,
    background: MC.bgPanel,
    display: 'flex',
    flexDirection: 'column',
    gap: 8,
  };

  const btnStyle = (isActive, isDanger) => ({
    padding: '6px 14px',
    fontSize: 12,
    borderRadius: 4,
    border: 'none',
    cursor: isActive ? 'not-allowed' : 'pointer',
    background: isActive ? MC.textMuted : isDanger ? MC.amber : MC.accent,
    color: isDanger && !isActive ? '#000' : '#fff',
    opacity: isActive ? 0.6 : 1,
    fontFamily: MC.mono,
    transition: 'opacity 0.15s',
  });

  return (
    <div style={{ padding: 16 }}>
      {/* 二段階確認モーダル */}
      <ConfirmModal
        jobId={confirmJob}
        meta={jobsMeta[confirmJob]}
        onConfirm={() => { runJob(confirmJob); setConfirmJob(null); }}
        onCancel={() => setConfirmJob(null)}
      />

      <h2 style={{ marginBottom: 16, fontSize: 15, fontWeight: 600, color: MC.text }}>⚙️ Fixed Jobs</h2>
      <p style={{ marginBottom: 16, fontSize: 12, color: MC.textDim }}>
        CLIスクリプトを許可リスト方式で実行します。⚠️ マークは二段階確認が必要です。
      </p>

      {/* ── Job cards ── */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(210px, 1fr))', gap: 12, marginBottom: 28 }}>
        {jobs.map(jobId => {
          const meta      = JOB_META[jobId] || { label: jobId, icon: '⚙️', desc: '' };
          const isRunning = status.running[jobId] || busy[jobId];
          const isDanger  = meta.danger || jobsMeta[jobId]?.requireConfirm;
          const lastRun   = [...status.history].reverse().find(h => h.jobId === jobId);
          const dot       = isRunning ? '⏳'
                          : lastRun?.status === 'done'    ? '✅'
                          : lastRun?.status === 'failed'  ? '❌'
                          : lastRun?.status === 'timeout' ? '⏰'
                          : '⚪';
          return (
            <div key={jobId} style={{ ...cardStyle, borderColor: isDanger ? `${MC.amber}66` : MC.border }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: MC.text }}>
                {meta.icon} {meta.label}
                {isDanger && <span style={{ marginLeft:6, fontSize:10, color:MC.amber }}>⚠️ 確認要</span>}
              </div>
              <div style={{ fontSize: 11, color: MC.textMuted }}>{meta.desc}</div>
              {lastRun && (
                <div style={{ fontSize: 11, color: MC.textDim }}>
                  {dot} {lastRun.status}
                  {lastRun.exitCode !== null && lastRun.exitCode !== 0 && (
                    <span style={{ color: '#f66', marginLeft: 4 }}>exit:{lastRun.exitCode}</span>
                  )}
                  {lastRun.endAt && <span style={{ marginLeft: 4 }}>{lastRun.endAt.slice(11, 19)}</span>}
                </div>
              )}
              <button style={btnStyle(isRunning, isDanger)} onClick={() => handleRunClick(jobId)} disabled={isRunning}>
                {isRunning ? '⏳ Running…' : isDanger ? '⚠️ Run' : '▶ Run'}
              </button>
            </div>
          );
        })}
      </div>

      {/* ── History table ── */}
      {status.history.length > 0 && (
        <HistoryTable history={status.history} />
      )}

      {error && <div style={{ color: '#f66', marginTop: 10, fontSize: 12 }}>❌ {error}</div>}
    </div>
  );
}
window.JobsPanel = JobsPanel;
  </script>

  <script type="text/babel">
const DOW_JP = ["日","月","火","水","木","金","土"];

// ── Cron parsing helpers ──────────────────────────────────
function parseDows(dowStr) {
  if (!dowStr || dowStr === "*") return new Set([0,1,2,3,4,5,6]);
  const result = new Set();
  String(dowStr).split(",").forEach(part => {
    if (part.includes("-")) {
      const [a,b] = part.split("-").map(Number);
      for (let i=a; i<=b; i++) result.add(i);
    } else {
      const n = parseInt(part);
      if (!isNaN(n)) result.add(n);
    }
  });
  return result;
}

function formatDowsStr(dowSet) {
  const sorted = [...dowSet].sort((a,b) => a-b);
  if (sorted.length === 7) return "毎日";
  const isConsec = sorted.every((d,i) => i===0 || d===sorted[i-1]+1);
  if (isConsec && sorted.length >= 3) return `${DOW_JP[sorted[0]]}〜${DOW_JP[sorted[sorted.length-1]]}`;
  return sorted.map(d => DOW_JP[d]).join("・");
}

function parseCronExpr(expr) {
  const parts = String(expr || "").trim().split(/\s+/);
  if (parts.length < 5) return null;
  const min  = parseInt(parts[0]);
  const hour = parseInt(parts[1]);
  const dowSet = parseDows(parts[4]);
  return { min, hour, dowSet };
}

function formatScheduleDisplay(expr) {
  const p = parseCronExpr(expr);
  if (!p) return expr;
  const t = `${String(p.hour).padStart(2,"0")}:${String(p.min).padStart(2,"0")}`;
  return `${formatDowsStr(p.dowSet)} ${t}`;
}

function computeNextRunDate(expr) {
  const p = parseCronExpr(expr);
  if (!p) return null;
  const now = new Date();
  for (let i = 0; i <= 7; i++) {
    const d = new Date(now);
    d.setDate(d.getDate() + i);
    d.setHours(p.hour, p.min, 0, 0);
    if (i === 0 && d <= now) continue;
    if (p.dowSet.has(d.getDay())) return d;
  }
  return null;
}

function formatNextRunDisplay(nextRunStr, expr) {
  // Prefer server-provided string if it has date info
  if (nextRunStr && nextRunStr !== "—") {
    try {
      const datePart = nextRunStr.split(" ")[0];
      const timePart = nextRunStr.split(" ")[1] || "";
      if (datePart.includes("-")) {
        const d = new Date(datePart + "T00:00:00");
        if (!isNaN(d.getTime())) {
          const m   = String(d.getMonth()+1).padStart(2,"0");
          const day = String(d.getDate()).padStart(2,"0");
          const dow = DOW_JP[d.getDay()];
          return `${m}/${day}(${dow}) ${timePart}`;
        }
      }
    } catch {}
  }
  // Compute from cron expression
  if (expr) {
    const d = computeNextRunDate(expr);
    if (d) {
      const m   = String(d.getMonth()+1).padStart(2,"0");
      const day = String(d.getDate()).padStart(2,"0");
      const dow = DOW_JP[d.getDay()];
      const h   = String(d.getHours()).padStart(2,"0");
      const min = String(d.getMinutes()).padStart(2,"0");
      return `${m}/${day}(${dow}) ${h}:${min}`;
    }
  }
  return "—";
}

                          const dist = Math.abs(cumLen - mid);
                          if (dist < bestDist) { bestDist = dist; bestIdx = i; }
                          cumLen += 1 + parts[i].length;
                        }
                        return [parts.slice(0, bestIdx).join('-'), parts.slice(bestIdx).join('-')];
                      })();
                      return (
                        <div key={day}
                          title={hits.map(s => `${s.project} (${formatScheduleDisplay(s.schedule)})`).join("\n")}

  React.useEffect(() => {
    const id = setInterval(() => setNow(Date.now()), 1000);
    return () => clearInterval(id);
  }, []);
  const completedCount = steps.filter(s => s.status === "completed").length;
  const runningCount   = steps.filter(s => s.status === "running").length;
  // リアルタイム経過時間（セッション開始から）
  const sessionElapsedSec = (() => {
    const ref = state?.sessionStartAt || null;
    if (!ref) return null;
    return Math.floor((now - new Date(ref).getTime()) / 1000);
  })();
  const fmtSec = s => s == null ? '—' : s < 60 ? `${s}s` : s < 3600 ? `${Math.floor(s/60)}m${s%60}s` : `${Math.floor(s/3600)}h${Math.floor((s%3600)/60)}m`;
  const BootBadge = ({ status }) => {
    const map = { completed:{color:MC.green,label:"完了"}, running:{color:MC.amber,label:"実行中"}, pending:{color:MC.textMuted,label:"待機"} };
    const m = map[status] || map.pending;
    return <Tag color={m.color}>{m.label}</Tag>;
  };
  return (
    <div style={{ display:"grid", gridTemplateColumns:"1fr 320px", gap:12, height:"100%" }}>
      <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
        <Panel title="Boot Sequence 進捗" icon="🏁">
          <div style={{ display:"flex", alignItems:"center", gap:16, marginBottom:12 }}>
            <div style={{ flex:1 }}>
              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:4 }}>

              </div>
              <div style={{ height:8, background:MC.border, borderRadius:4, overflow:"hidden" }}>
                <div style={{ height:"100%", borderRadius:4, transition:"width 0.5s", width:`${(completedCount/9)*100}%`, background:`linear-gradient(90deg, ${MC.accent}, ${MC.green})` }} />
              </div>
              {sessionElapsedSec != null && (
                <div style={{ marginTop:6, fontSize:10, color:MC.textMuted, fontFamily:MC.mono }}>
                  ⏱ セッション経過: <span style={{ color:MC.accent }}>{fmtSec(sessionElapsedSec)}</span>
                  <span style={{ marginLeft:12, color:MC.textMuted }}>更新: {new Date(now).toLocaleTimeString('ja-JP')}</span>
                </div>
              )}
            </div>
            <div style={{ textAlign:"center" }}><div style={{ fontSize:28, fontWeight:800, fontFamily:MC.mono, color:MC.green }}>{completedCount}</div><div style={{ fontSize:9, color:MC.textMuted }}>完了</div></div>
            <div style={{ textAlign:"center" }}><div style={{ fontSize:28, fontWeight:800, fontFamily:MC.mono, color:MC.amber }}>{runningCount}</div><div style={{ fontSize:9, color:MC.textMuted }}>実行中</div></div>
          </div>
        </Panel>
        <Panel title="9ステップ初期化" icon="🚀" noPad style={{ flex:1 }}>
          <div style={{ display:"flex", flexDirection:"column" }}>
            {steps.map((step) => (
              <div key={step.step} onClick={() => setExpandedStep(expandedStep===step.step ? null : step.step)} style={{ padding:"12px 16px", borderBottom:`1px solid ${MC.border}08`, cursor:"pointer", transition:"background 0.15s", background: expandedStep===step.step ? MC.accent+"08" : "transparent" }}>
                <div style={{ display:"flex", alignItems:"center", gap:12 }}>
                  <div style={{ width:32, height:32, borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center", fontSize:13, fontWeight:700, fontFamily:MC.mono, flexShrink:0, background: step.status==="completed" ? MC.green+"20" : step.status==="running" ? MC.amber+"20" : MC.border, color: step.status==="completed" ? MC.green : step.status==="running" ? MC.amber : MC.textMuted, border:`2px solid ${step.status==="completed" ? MC.green+"60" : step.status==="running" ? MC.amber+"60" : MC.border}` }}>{step.status==="completed" ? "✓" : step.step}</div>
                  <div style={{ flex:1 }}>
                    <div style={{ display:"flex", alignItems:"center", gap:8 }}><span style={{ fontSize:12, fontWeight:600, color:MC.text }}>{step.name}</span><span style={{ fontSize:10, color:MC.textMuted }}>({step.nameEn})</span></div>
                    <div style={{ fontSize:10, color:MC.textMuted, marginTop:2 }}>{step.detail}</div>
                  </div>
                  <div style={{ textAlign:"right", flexShrink:0 }}><BootBadge status={step.status} />{step.duration!=="—" && <div style={{ fontSize:9, fontFamily:MC.mono, color:MC.textMuted, marginTop:2 }}>{step.duration}</div>}</div>
                </div>
                {expandedStep===step.step && (
                  <div style={{ marginTop:10, marginLeft:44, padding:"10px 12px", background:MC.bgCard, borderRadius:6, border:`1px solid ${MC.border}`, fontSize:11, color:MC.textDim, lineHeight:1.6 }}>
                    <div><strong style={{ color:MC.text }}>Step {step.step}:</strong> {step.name} ({step.nameEn})</div>
                    <div style={{ marginTop:4 }}>状態: <span style={{ color: step.status==="completed" ? MC.green : MC.amber }}>{step.status}</span></div>
                    <div>所要時間: {step.duration}</div><div>詳細: {step.detail}</div>
                  </div>
                )}
              </div>
            ))}
          </div>
        </Panel>
      </div>
      <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
        {/* ── Active Cron Session Panel ── */}
        <Panel title="アクティブCronセッション" icon="🚀">
          {(() => {
            const cron = proj.activeCron;

                      background: level>=3 ? `linear-gradient(90deg,${MC.green},#22c55e)` :

        </Panel>
        <Panel title="Boot コマンド" icon="⌨️">
          <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
            {[["Start-ClaudeOS.ps1","9ステップ初期化"],["Start-ClaudeOS.ps1 -DryRun","非破壊プレビュー"],["Start-ClaudeOS.ps1 -NonInteractive","CI / 自動実行向け"]].map(c => (

  <script type="text/babel">
const LogPanel = ({ liveData, liveLines }) => {
  const logs = (liveData?.eventLog?.length ? liveData.eventLog : null) || window.EVENT_LOG;
  const [filter, setFilter] = React.useState("all");
  const [autoScroll, setAutoScroll] = React.useState(true);
  const logRef  = React.useRef(null);
  const liveRef = React.useRef(null);
  const isLive  = filter === "live";
  const filtered = filter === "all" ? logs : filter === "live" ? [] : logs.filter(l => l.type === filter);
  React.useEffect(() => {
    if (autoScroll && logRef.current)  logRef.current.scrollTop  = logRef.current.scrollHeight;
  }, [filtered.length, autoScroll]);
  React.useEffect(() => {
    if (autoScroll && liveRef.current) liveRef.current.scrollTop = liveRef.current.scrollHeight;
  }, [(liveLines || []).length, autoScroll]);
  const typeColors = { info:MC.textDim, success:MC.green, decision:MC.amber, phase:MC.accent, error:MC.red };
  const typeLabels = { info:"情報", success:"成功", decision:"判断", phase:"フェーズ", error:"エラー" };
  return (
    <div style={{ display:"flex", flexDirection:"column", gap:12, height:"100%" }}>
      <div style={{ display:"flex", gap:6, alignItems:"center" }}>
        {[["all","すべて"],["live","🔴 ライブ"],["info","情報"],["success","成功"],["decision","判断"],["phase","フェーズ"],["error","エラー"]].map(([id,label]) => (
          <button key={id} onClick={() => setFilter(id)} style={{ padding:"5px 12px", borderRadius:4, border:`1px solid ${filter===id ? (id==="live"?"#ff4444":MC.accent) : MC.border}`, background: filter===id ? (id==="live"?"#ff444418":MC.accent+"18") : "transparent", color: filter===id ? (id==="live"?"#ff4444":MC.accent) : MC.textMuted, fontSize:11, cursor:"pointer", fontWeight:500 }}>{label}</button>
        ))}
        <div style={{ marginLeft:"auto", display:"flex", alignItems:"center", gap:6 }}>
          <button onClick={() => setAutoScroll(!autoScroll)} style={{ padding:"5px 10px", borderRadius:4, border:`1px solid ${MC.border}`, background: autoScroll ? MC.green+"18" : "transparent", color: autoScroll ? MC.green : MC.textMuted, fontSize:10, cursor:"pointer" }}>{autoScroll ? "⬇ 自動スクロール ON" : "⬇ 自動スクロール OFF"}</button>
          <span style={{ fontSize:10, color:MC.textMuted, fontFamily:MC.mono }}>{isLive ? (liveLines||[]).length : filtered.length}件</span>
        </div>
      </div>
      <Panel title={isLive ? "🔴 ライブフィード (SSE)" : "イベントログ"} icon="📜" noPad style={{ flex:1 }}>
        {isLive ? (
          <div ref={liveRef} style={{ height:"100%", overflow:"auto", fontFamily:MC.mono, fontSize:11, padding:"4px 0" }}>
            {(liveLines||[]).length === 0 ? (
              <div style={{ padding:16, color:MC.textMuted }}>SSE 接続待ち… ライブログがここに流れます。</div>
            ) : (
              (liveLines||[]).map((item, i) => (
                <div key={i} style={{ padding:"3px 12px", borderBottom:`1px solid ${MC.border}06`,
                  background: i % 2 === 0 ? "transparent" : MC.bgCard+"30",
                  display:"flex", gap:12, alignItems:"baseline" }}>
                  <span style={{ color:MC.textMuted, fontSize:10, flexShrink:0, width:80 }}>
                    {(item.at||"").slice(11,19)}
                  </span>
                  <span style={{ color: item.line?.startsWith("[") ? MC.accent : MC.textDim, lineHeight:1.5, wordBreak:"break-all" }}>
                    {item.line}
                  </span>
                </div>
              ))
            )}
          </div>
        ) : (
          <div ref={logRef} style={{ height:"100%", overflow:"auto", fontFamily:MC.mono, fontSize:11 }}>
            <table style={{ width:"100%", borderCollapse:"collapse" }}>
              <thead><tr style={{ position:"sticky", top:0, background:MC.bgPanel, borderBottom:`1px solid ${MC.border}`, zIndex:1 }}>
                <th style={{ padding:"8px 12px", textAlign:"left", color:MC.textMuted, fontWeight:500, fontSize:10, width:80 }}>時刻</th>
                <th style={{ padding:"8px 12px", textAlign:"left", color:MC.textMuted, fontWeight:500, fontSize:10, width:160 }}>エージェント</th>
                <th style={{ padding:"8px 12px", textAlign:"left", color:MC.textMuted, fontWeight:500, fontSize:10 }}>メッセージ</th>
                <th style={{ padding:"8px 12px", textAlign:"left", color:MC.textMuted, fontWeight:500, fontSize:10, width:60 }}>種別</th>
              </tr></thead>
              <tbody>
                {filtered.map((log,i) => (
                  <tr key={i} style={{ borderBottom:`1px solid ${MC.border}06`, background: i%2===0 ? "transparent" : MC.bgCard+"40" }}>
                    <td style={{ padding:"6px 12px", color:MC.textMuted, fontSize:10, whiteSpace:"nowrap" }}>{log.time}</td>
                    <td style={{ padding:"6px 12px", color:MC.text, fontSize:11 }}>{log.agent}</td>
                    <td style={{ padding:"6px 12px", color:typeColors[log.type]||MC.textDim, lineHeight:1.4 }}>{log.message}</td>
                    <td style={{ padding:"6px 12px" }}><Tag color={typeColors[log.type]||MC.textMuted}>{typeLabels[log.type]||log.type}</Tag></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </Panel>
    </div>
  );
};
window.LogPanel = LogPanel;
  </script>

  <!-- ═══════════════════════════════════════════════════
       BLOCK 10: App Root
  ═══════════════════════════════════════════════════ -->
  <script type="text/babel">
const TWEAK_DEFAULTS = { accentColor: "#00d4ff", darkMode: true, showScanlines: false, clockFormat: "24h", animationsEnabled: true };

const App = () => {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [activePanel, setActivePanel] = React.useState("projects");
  const [sessionElapsed, setSessionElapsed] = React.useState(window.MOCK_STATE.execution.elapsed_minutes);
  const [, forceRender] = React.useState(0);
  // liveData: 30秒ごとに /api/mc-data から取得した実データ
  const [liveData, setLiveData] = React.useState(null);
  const [lastUpdated, setLastUpdated] = React.useState(null);
  // agentTeamsActivity: state.agent_teams_usage の集計（agent-teams-tracker.js hook 由来）
  const [agentTeamsActivity, setAgentTeamsActivity] = React.useState(null);
  // SSE リアルタイム状態
  const [sseConnected, setSseConnected] = React.useState(false);
  const [livePhase, setLivePhase]       = React.useState(null);
  const [liveLines, setLiveLines]       = React.useState([]);

  React.useEffect(() => {
    applyTheme(t.darkMode);
    forceRender(n => n + 1);
  }, [t.darkMode]);

  React.useEffect(() => {
    MC.accent = t.accentColor;
    forceRender(n => n + 1);
  }, [t.accentColor]);

  // SSE 接続 — リアルタイムイベント受信
  React.useEffect(() => {
    const es = new EventSource('/api/events');
    es.onopen  = () => setSseConnected(true);
    es.onerror = () => setSseConnected(false);
    es.addEventListener('state-change', e => {
      try {
        const d = JSON.parse(e.data);
        if (d.phase) setLivePhase(d.phase);
      } catch {}
    });
    es.addEventListener('log-line', e => {
      try {
        const d = JSON.parse(e.data);
        setLiveLines(prev => [...prev.slice(-199), d]);
      } catch {}
    });
    es.addEventListener('job-update', e => {
      try {
        // job-update は JobsPanel の 3秒ポーリングが拾うため状態更新はスキップ
        const d = JSON.parse(e.data);
        setLiveLines(prev => [...prev.slice(-199), { line: `[job] ${d.jobId}: ${d.status}${d.exitCode!=null?' exit:'+d.exitCode:''}`, at: new Date().toISOString() }]);
      } catch {}
    });
    return () => es.close();
  }, []);

  // 単一の 30秒ポーリング — 全パネルに liveData を供給
  React.useEffect(() => {
    const fetchAll = () => {
      fetch('/api/mc-data')
        .then(r => r.json())
        .then(d => { setLiveData(d); setLastUpdated(new Date()); })
        .catch(() => { /* モックデータで継続 */ });
      fetch('/api/agent-teams')
        .then(r => r.json())
        .then(d => setAgentTeamsActivity(d))
        .catch(() => { /* 取得失敗時は前回値を継続表示 */ });
    };
    fetchAll();
    const tid = setInterval(fetchAll, 30000);
    return () => clearInterval(tid);
  }, []);

  const renderPanel = () => {
    const state = liveData?.state || window.MOCK_STATE;
    switch (activePanel) {
      case "projects":  return <ProjectsPanel />;
      case "dashboard": return <DashboardPanel state={state} sessionElapsed={sessionElapsed} liveData={liveData} />;
      case "agents":    return <AgentsPanel state={state} liveData={liveData} agentTeamsActivity={agentTeamsActivity} />;
      case "jobs":      return <JobsPanel />;
      case "health":    return <SystemHealthPanel />;
      case "cicd":      return <CICDPanel liveData={liveData} />;
      case "cron":      return <CronPanel liveData={liveData} />;
      case "boot":      return <BootPanel state={state} liveData={liveData} />;
      case "log":       return <LogPanel liveData={liveData} liveLines={liveLines} />;
      default:          return <ProjectsPanel />;
    }
  };

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100vh", background:MC.bg, position:"relative" }}>
      {t.showScanlines && (
        <div style={{ position:"fixed", top:0, left:0, right:0, bottom:0, pointerEvents:"none", zIndex:1000, background:"repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px)" }} />
      )}
      <TopBar state={window.MOCK_STATE} sessionElapsed={sessionElapsed} setSessionElapsed={setSessionElapsed}
        darkMode={t.darkMode} onToggleDark={() => setTweak("darkMode", !t.darkMode)}
        lastUpdated={lastUpdated} sseConnected={sseConnected} livePhase={livePhase} />
      <div style={{ display:"flex", flex:1, overflow:"hidden" }}>
        <SideNav active={activePanel} onChange={setActivePanel} />
        <main style={{ flex:1, padding:16, overflow:"auto", animation: t.animationsEnabled ? "mcFadeIn 0.3s ease" : "none" }} key={activePanel}>
          {renderPanel()}
        </main>
      </div>
      <TweaksPanel title="Tweaks">
        <TweakSection label="テーマ">
          <TweakToggle label="ダークモード" value={t.darkMode} onChange={v => setTweak("darkMode", v)} />
          <TweakColor label="アクセントカラー" value={t.accentColor}
            options={["#00d4ff","#a78bfa","#00ff88","#fbbf24","#ff6b6b"]}
            onChange={v => setTweak("accentColor", v)} />
          <TweakToggle label="スキャンライン効果" value={t.showScanlines} onChange={v => setTweak("showScanlines", v)} />
          <TweakToggle label="アニメーション" value={t.animationsEnabled} onChange={v => setTweak("animationsEnabled", v)} />
        </TweakSection>
        <TweakSection label="表示">
          <TweakSelect label="時計形式" value={t.clockFormat} options={["24h","12h"]} onChange={v => setTweak("clockFormat", v)} />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
